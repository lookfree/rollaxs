services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:?请在 .env 设置 SECRET_KEY}
      - BASE_URL=${BASE_URL:-http://localhost:8080}
      - SESSION_HTTPS_ONLY=${SESSION_HTTPS_ONLY:-0}
    volumes:
      - ../data:/srv/data
      - ../uploads:/srv/uploads

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../uploads:/srv/uploads:ro
      - ../app/static:/srv/static:ro
    depends_on:
      - app
